# ================= BASIC =================
server.port=8080
spring.application.name=api-gateway

# Safety: allows bean definition overrides during auto-configuration.
spring.main.allow-bean-definition-overriding=true

# ================= EUREKA =================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ================= GATEWAY ROUTES =================

# -------- AUTH SERVICE --------
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# -------- CATALOG SERVICE --------
spring.cloud.gateway.server.webflux.routes[1].id=catalog-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://catalog-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/gateway/catalog/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# -------- ORDER SERVICE --------
spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/gateway/orders/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# ================= ADMIN ROUTES =================

spring.cloud.gateway.server.webflux.routes[3].id=admin-products
spring.cloud.gateway.server.webflux.routes[3].uri=lb://catalog-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/gateway/admin/products/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/gateway/admin/products(?<segment>/.*)?$,/catalog/products${segment}
spring.cloud.gateway.server.webflux.routes[3].order=1

spring.cloud.gateway.server.webflux.routes[4].id=admin-orders
spring.cloud.gateway.server.webflux.routes[4].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/gateway/admin/orders/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/gateway/admin/orders(?<segment>/.*),/orders/admin/orders${segment}
spring.cloud.gateway.server.webflux.routes[4].order=2

# -------- ADMIN SERVICE --------
spring.cloud.gateway.server.webflux.routes[5].id=admin-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://admin-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=StripPrefix=1
spring.cloud.gateway.server.webflux.routes[5].order=0

# ================= SWAGGER UI AGGREGATION =================
# Use relative paths so Swagger works from any IP/host (not just localhost)
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/gateway/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=Catalog Service
springdoc.swagger-ui.urls[1].url=/gateway/catalog/v3/api-docs
springdoc.swagger-ui.urls[2].name=Order Service
springdoc.swagger-ui.urls[2].url=/gateway/orders/v3/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/gateway/admin/v3/api-docs

# Enable Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ================= JWT =================
app.jwt.secret=${APP_JWT_SECRET:mySuperSecretKeyThatIsAtLeast32CharactersLong!!}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:3600000}

# ================= ACTUATOR & HEALTH =================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# ================= ZIPKIN CONFIGURATION =================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=1.0

# ================= DEBUG & LOGGING =================
logging.level.root=INFO
logging.level.com.lpu.shopsphere=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
