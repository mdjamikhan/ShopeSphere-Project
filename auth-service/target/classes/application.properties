server.port=8081
spring.application.name=auth-service

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/authService?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jamikhan@09}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=${APP_JWT_SECRET:mySuperSecretKeyThatIsAtLeast32CharactersLong!!}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:3600000}

# Safety: allows bean definition overrides during auto-configuration.
spring.main.allow-bean-definition-overriding=true

# Swagger UI should be served from API Gateway only.
springdoc.swagger-ui.enabled=false

# Gateway forwards `/gateway/auth/**` to this service under `/auth/**` (StripPrefix=1).
springdoc.api-docs.path=/auth/v3/api-docs

# Avoid startup crash caused by missing ErrorPageRegistrar class.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration

# ================= ZIPKIN CONFIGURATION =================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=1.0

# Actuator for health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.lpu.shopsphere=DEBUG



