version: "3.9"

 
networks:
  shopsphere-net:
    driver: bridge

 
volumes:
  mysql-data:
  rabbitmq-data:

 
services:

 
  mysql:
    image: mysql:8.0
    container_name: shopsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Jamikhan@09}
      MYSQL_DATABASE: authService
    ports:
      - "3307:3306"  # avoid conflict with host MySQL
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - shopsphere-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Jamikhan@09}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
 
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shopsphere-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"      
      - "15672:15672"    
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - shopsphere-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Zipkin ───────────────────────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: shopsphere-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - shopsphere-net
    environment:
      - STORAGE_TYPE=mem
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: shopsphere-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - shopsphere-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || wget -qO- http://localhost:8761/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

   
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: shopsphere-auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Jamikhan@09}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-mySuperSecretKeyThatIsAtLeast32CharactersLong!!}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8081:8081"
    networks:
      - shopsphere-net

   
  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: shopsphere-catalog
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Jamikhan@09}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8082:8082"
    networks:
      - shopsphere-net

   
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: shopsphere-order
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Jamikhan@09}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8083:8083"
    networks:
      - shopsphere-net

   
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: shopsphere-admin
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      APP_JWT_SECRET: ${APP_JWT_SECRET:-mySuperSecretKeyThatIsAtLeast32CharactersLong!!}
    ports:
      - "8084:8084"
    networks:
      - shopsphere-net

  
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: shopsphere-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      APP_JWT_SECRET: ${APP_JWT_SECRET:-mySuperSecretKeyThatIsAtLeast32CharactersLong!!}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8080:8080"
    networks:
      - shopsphere-net
