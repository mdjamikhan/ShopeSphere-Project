server.port=8082
spring.application.name=catalog-service

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/Catalog_service?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jamikhan@09}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Safety: allows bean definition overrides during auto-configuration.
spring.main.allow-bean-definition-overriding=true

# Swagger UI should be served from API Gateway only.
springdoc.swagger-ui.enabled=false

# Gateway forwards `/gateway/catalog/**` to this service under `/catalog/**` (StripPrefix=1).
springdoc.api-docs.path=/catalog/v3/api-docs

# Avoid startup crash caused by missing ErrorPageRegistrar class.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration

# ================= ZIPKIN CONFIGURATION =================
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
management.tracing.sampling.probability=1.0

# ─── RabbitMQ ────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Actuator for health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.lpu.shopsphere=DEBUG
